name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Cho phép kích hoạt build thủ công bằng nút trên web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tải mã nguồn từ kho lưu trữ
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Thiết lập môi trường Android SDK
        uses: android-actions/setup-android@v2

      - name: Sao chép tài nguyên Web vào Assets của Android
        run: |
          mkdir -p android/app/src/main/assets
          cp -r src/* android/app/src/main/assets/

      - name: Thiết lập Gradle (Tải và cấu hình Gradle 7.5.1)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 7.5.1

      - name: Biên dịch ứng dụng Android (Tạo file APK Debug)
        run: gradle assembleDebug
        working-directory: android

      - name: Tải file APK lên thành Artifact để tải về
        uses: actions/upload-artifact@v4
        with:
          name: skypec-auto-reader-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
